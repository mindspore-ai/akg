# 框架参考表和可调参数。settings.py 每个进程只加载一次
# （scripts/utils/settings.py 为每个 key 提供一个类型化 accessor）。
#
# 本文件包含两类内容：
#   1. 原样消费的参考表（hallucinated_scripts、remote_worker.hosts），
#      结构可以相对自由。
#   2. 可调参数；代码里不再写兜底默认值。缺少 section/key 时，
#      settings._get 会直接报错。详见下方“可调参数”部分。
#
# 需要调参时直接改这里的值；settings.py 使用 @lru_cache 读取，
# 长生命周期进程不会自动感知修改，需要重启。


# ---------------------------------------------------------------------------
# 幻觉脚本别名表。hooks/guard_bash 在真正执行 Bash 前会先查这张表：
# 如果 Claude 尝试 `python scripts/engine/<key>.py ...`，hook 会把拒绝
# 信息改写为指向 <value>.py 的“你是不是想运行这个？”提示，而不是
# 泛泛地报“unknown script”。
#
# 当日志里出现新的“看起来合理但实际错误”的脚本名时，就在这里加一项。
# key 是 Claude 编造出的错误名字；value 是真实入口脚本
# （必须存在于 scripts/engine/ 下）。
# ---------------------------------------------------------------------------
hallucinated_scripts:
  eval.py: baseline.py
  run_eval.py: baseline.py
  verify.py: baseline.py
  check.py: quick_check.py
  run.py: baseline.py
  test.py: quick_check.py
  profile.py: baseline.py


# ---------------------------------------------------------------------------
# 远端 worker SSH 调度；用于：
#   `akg_cli worker --remote-host <alias> --start/stop/status ...`
#
# `hosts:` 下的每个 alias 描述一台 akg_cli 可以 SSH 进去并启动 worker
# daemon 的机器。每次调用 --start / --status / --stop --remote-host 时，
# akg_cli 都会读取这张表（默认 ./config.yaml；可用
# --remote-config <path> 覆盖）。
#
# 字段说明：
#   repo_path   （必填）远端 akg checkout 的绝对路径，也就是包含
#                         akg_agents/ 的外层目录。akg_cli 会用它把远端
#                         PYTHONPATH 固定到 `<repo_path>/akg_agents/python`，
#                         确保 daemon 跑的是当前 checkout 的源码，而不是
#                         site-packages 里残留的 pip install 版本。
#   env_script  （必填）启动 daemon 前 source 的 shell 脚本。launcher 会先
#                         启用 conda shell hook，所以 SSH 非交互 shell 里
#                         也可以直接 `conda activate ...`。该脚本结束后必须
#                         保证 `python -c "import torch_npu, triton"` 可用；
#                         同一个由 PATH 选中的 python 会运行远端 akg_cli。
#   ssh_alias   （可选）传给 ssh 的主机名。默认等于当前 key 名；当
#                         ~/.ssh/config 里的 host alias 和这里想用的名字
#                         不一致时再覆盖。
#
# 隧道由 akg_cli 自动管理：--start 时会打开
# `ssh -L <port>:127.0.0.1:<port> <alias> -f -N -T`，并把 fork 出来的
# ssh pid 写到 ~/.akg_agents/tunnels/<port>.pid。后续 --status / --stop /
# `--worker-url 127.0.0.1:<port>` 都会透明地通过该隧道访问远端 daemon。
# ---------------------------------------------------------------------------
  # 示例配置；按实际部署路径和环境脚本填写：
  #   my-npu:
  #     repo_path: /abs/path/to/akg
  #     env_script: /abs/path/env.sh
  #     # ssh_alias: my-host
remote_worker:
  hosts:
    npu:
      repo_path:
      env_script:
      ssh_alias:


# ===========================================================================
# 可调参数。
#
# 下方所有内容均以 config.yaml 为单一事实源。settings.py 为每个 key 暴露
# 一个 accessor（settings.<name>()），且不提供代码内默认值；缺少 section
# 或 key 会在第一次读取时报 KeyError。调参请只改这里的值；不要在
# settings.py 或下游 caller 里新增 fallback，否则会破坏单一事实源约束。
# 如果要删除某个参数，需要同时删除 settings.py 里的 accessor、本文件里的
# key，并用 `git grep <accessor>` 审计调用方。
# ===========================================================================


# ---------------------------------------------------------------------------
# 任务默认值；当 scaffold CLI flag 未传入，且 task.yaml 没有固定对应字段时
# 使用。运行时优先级：
#       task.yaml 字段   >  本 defaults block  >  （无代码内默认值）
#
# scaffold 创建任务时会把解析后的值写入 task.yaml。因此，即使之后调这里的
# defaults，已经创建好的任务仍保留当时 scaffold 出来的值。
#
# 字段说明：
#   max_rounds            (int)         新任务的优化轮次预算：PLAN → EDIT →
#                                       eval 循环。达到 max_rounds 后，状态机会
#                                       自动转入 FINISH 并写 report.md。可通过
#                                       scaffold 的 --max-rounds 按任务覆盖。
#   eval_timeout          (int seconds) 单个 verify/profile 子进程的墙钟预算。
#                                       eval_runner 会按 num_cases 放大；50 个
#                                       shape 的 op 会得到约 50 倍预算。
#                                       SIGKILL/124 时调大；想让 hang 更快失败
#                                       时调小。
#   reference_data_timeout (int seconds) 未提供任务级配置时，
#                                       generate_reference 的预算。
#   smoke_test_timeout    (int seconds) quick_check 可选 smoke test 的预算
#                                       （按任务计，不按 shape 计）。仅当
#                                       task.yaml 设置 smoke_test_script 时触发。
#                                       它在每次 EDIT 的关键路径上，应保持较小。
#   code_checker_enabled  (bool)        Triton impl AST 回归检查是否默认启用。
#                                       该检查由 quick_check.py 调用
#                                       scripts/utils/validate_triton_impl.py，
#                                       用于抓伪造 @triton.jit contract 的 kernel。
#                                       可在 task.yaml 中用
#                                       `code_checker: {enabled: false}` 或
#                                       scaffold 的 --no-code-checker 按任务关闭。
#   metric.primary        (str)         keep_or_discard 读取的指标名。目前只有
#                                       `latency_us` 会被解释；其他值会进入
#                                       report.py 的 "unknown metric" 分支。
#   metric.lower_is_better (bool)       true 表示越小越好（延迟）；false 表示
#                                       越大越好（吞吐）。
#   metric.improvement_threshold (float) KEEP 门槛。单位是百分比，不是小数；
#                                       与 is_improvement 中的
#                                       `relative_pct = (best-cand)/|best| * 100`
#                                       对齐。示例：
#                                         0.0  → 任意严格提升都会 keep
#                                         2.0  → 需要提升超过 2 %
#                                         5.0  → 需要提升超过 5 %
#                                       这里设 0.05 表示“>0.05 %”，几乎任何
#                                       正向提升都会通过。
#   consecutive_fail_threshold (int)    连续 FAIL 多少次后从 PLAN/EDIT 转入
#                                       DIAGNOSE。以前在 phase_policy.py 里
#                                       硬编码为 `3`。
#   diagnose_max_attempts (int)         同一 plan_version 下 DIAGNOSE subagent
#                                       最多重试次数；超过后进入人工兜底产物路径。
#                                       以前在 state_store.py 里硬编码为
#                                       `DIAGNOSE_ATTEMPTS_CAP = 5`。
#   backend / framework / dsl (str)     workspace 目标三元组，按 repo 固定。
#                                       utils.akg_eval 会把它们传给
#                                       akg_agents.op.verifier.KernelVerifier。
#                                       其中 `dsl` 使用 snake-form，如
#                                       `triton_ascend`。该配置不属于 TaskConfig；
#                                       这是单 repo 单目标设计，和 skill_dsl 一致。
#                                       CA 的 eval_kernel.py argparse 默认值
#                                       是上游等价物。
# ---------------------------------------------------------------------------
defaults:
  max_rounds: 30
  eval_timeout: 600
  reference_data_timeout: 120
  kill_grace_s: 5.0
  kill_drain_s: 2.0
  smoke_test_timeout: 10
  code_checker_enabled: true
  metric:
    primary: latency_us
    lower_is_better: true
    improvement_threshold: 0.0
  skill_dsl: ascendc
  backend: ascend
  framework: torch
  dsl: ascendc
  consecutive_fail_threshold: 3
  diagnose_max_attempts: 5


# ---------------------------------------------------------------------------
# eval 计时测量配置（utils/eval_runner.local_eval{,_async}）。
# 在计时实际发生的地方读取：远端 eval 时生效的是 WORKER 侧的 config.yaml，
# 不是 orchestrator 侧的 config.yaml。需要保持两边同步；否则就要接受
# local-baseline 和 remote round 的 warmup/repeats 可能不同。
#
# 字段说明：
#   warmup   (int) 测量开始前不计时的预热迭代次数。值越大，JIT/cache
#                  预热越充分，但每轮墙钟时间也越长。对大多数 op 而言，
#                  10 次足以让 triton-ascend 编译缓存稳定。
#   repeats  (int) 正式计时迭代次数，其均值作为每个 shape 的 latency_us。
#                  值越大方差越低，但每轮墙钟时间越长。在 910B 上观察到
#                  100 是方差和成本之间比较合适的点。
# ---------------------------------------------------------------------------
eval:
  warmup: 5
  repeats: 50


# ---------------------------------------------------------------------------
# 远端 worker daemon 配置。线缆两侧共用同一个事实源：
#   - akg_cli（开发机侧）：隧道端口、ready 等待、status 探活
#   - akg_agents.worker.server：bind 端口（避免两侧漂移）
#
# ready_* / status_* timeout 覆盖 akg_cli 通过 `ssh -L` 等远端 daemon 的
# 场景；除了 daemon 自身启动时间，还会叠加不稳定的网络往返延迟。如果慢网络
# 上出现 “worker not ready” 的误判，就调大；如果希望卡死 daemon 更快失败，
# 就调小。
#
# 字段说明：
#   port                (int)   worker 绑定的 TCP 端口（仅 127.0.0.1；到开发机
#                               的路由走 ssh -L）。也是 akg_cli --start /
#                               --status / --stop 的默认 --port。改这里后，
#                               下一次 `akg_cli worker --start` 会自动使用新端口。
#   ready_timeout       (float) 启动远端 daemon 后，akg_cli 最多等待它响应
#                               /status 的秒数。每 ready_poll_interval 秒轮询一次。
#                               CANN import + worker 启动在 warm cache 下约 5s，
#                               cold cache 下约 15s；20s 留有余量。
#   ready_poll_interval (float) 启动等待循环中两次 ready poll 的间隔秒数。
#                               越小发现 ready 越快，但等待期间 SSH 噪声越多。
#   ready_probe_timeout (float) ready 循环中单次 /status poll 的超时时间。
#                               保持较短，避免隧道卡住时一次 poll 吃掉整个
#                               ready_timeout。不同于下面的 status_timeout。
#   status_timeout      (float) 单独 /status 可达性探活的秒数
#                               （`akg_cli worker --status` 使用该路径；
#                               eval_client 在发送 multipart /run 前也用它快速失败）。
#                               高延迟链路上可调大。
#   lease_ttl           (float) 空闲远端 device lease 多久后会被 worker daemon
#                               reaper 回收。
#   lease_reap_interval (float) daemon 扫描过期 lease 的间隔秒数。
#   acquire_timeout     (float) 服务端等待空闲 device 的最长时间；
#                               超时后 /acquire_device 返回 503。
#   http_read_margin    (float) client read-timeout 相对服务端 work/wait 预算
#                               额外多留的余量。
#   release_timeout     (float) /release_device 的 client read-timeout。
#   doc_timeout         (float) /docs/<name> 的 client read-timeout。
#   health_timeout      (float) daemon 侧 /health event-loop 探活上限。
# ---------------------------------------------------------------------------
worker:
  port: 9111
  ready_timeout: 20.0
  ready_poll_interval: 0.5
  ready_probe_timeout: 1.5
  status_timeout: 5.0
  lease_ttl: 120.0
  lease_reap_interval: 30.0
  acquire_timeout: 600.0
  http_read_margin: 10.0
  release_timeout: 10.0
  doc_timeout: 20.0
  health_timeout: 5.0


# ---------------------------------------------------------------------------
# 批跑 driver 参数（scripts/batch/*）。这里放了两类彼此无关的 timeout：
# 长批跑前的 Tier 1/2 预检 verify（batch/verify.py 使用），以及每个 op 的
# driver 墙钟上限和 op 间冷却时间（batch/run.py 循环 op 时使用）。
#
# 字段说明：
#   tier1_timeout    (int seconds)  每个 op 的 Tier 1 verify 预算：import +
#                                   tiny-shape smoke。不需要 NPU，主要抓语法错误
#                                   和缺失 export。
#   tier2_timeout    (int seconds)  每个 op 的 Tier 2 verify 预算：使用真实
#                                   kernel 做完整 multi-shape 正确性验证。
#                                   triton-ascend 在 cold JIT、约 50 cases 下，
#                                   对 constexpr 特化很多的 kernel
#                                   （maxpool3d、attention 变体等）可能需要数分钟。
#   run_timeout_min  (int minutes)  batch/run.py 中每个 op 的硬墙钟上限
#                                   （注意单位是分钟，不是秒）。每个 op 最多运行
#                                   这么久；超时后 run.py 会 SIGTERM
#                                   claude --print，并把该 op 标为 `error`。
#                                   可用 `batch/run.py --timeout-min N` 单次覆盖。
#                                   建议按观测中位数约 3 倍校准
#                                   （cold JIT + 30 轮 + report）。
#   cooldown_sec     (int seconds)  batch/run.py 中两个 op 之间的 sleep 时间。
#                                   让 worker 完成 cleanup（释放 device、GC HBM）
#                                   后再让下一个 op acquire。可用
#                                   `--cooldown-sec N` 覆盖。0 允许，但更容易触发
#                                   偶发 device-acquire 竞态。
#   transient_retries (int)         同一个 op 内，当 session 中途崩溃
#                                   （claude.exe rc != 0）但框架进度仍完整
#                                   （progress_initialized=True）时，batch/run.py
#                                   最多重新拉起
#                                   `claude --print /autoresearch --resume
#                                   <task_dir> --force` 的次数。用于兜住
#                                   ECONNRESET / stream idle timeout / 临时 API
#                                   错误这类没有走 stop_save 就退出 CLI 的情况。
#                                   真失败不会重试，会直接暴露：
#                                   rc=0 + phase != FINISH 表示 LLM 提前结束 turn；
#                                   rc != 0 + 无 progress 表示 baseline 尚未提交。
# ---------------------------------------------------------------------------
batch:
  tier1_timeout: 30
  tier2_timeout: 600
  run_timeout_min: 180
  cooldown_sec: 5
  transient_retries: 3


# ---------------------------------------------------------------------------
# 批跑 reporter（summarize.py / monitor.py）以及 settings.py 中共享的
# classify_speedup() 使用的加速比分桶。数值是 speedup factor：
# v = baseline_us / candidate_us；v=1.0 表示 candidate 与 ref 持平。
#
# 三个桶：v > improved_above → "improved"；v < regress_below → "regress"；
# 中间区间 → "on-par"。区间越宽，对噪声越宽容；区间越窄，小幅变化也会被标记。
#
# 字段说明：
#   speedup_improved_above  (float)  上桶阈值。v 高于该值时报 "improved"。
#   speedup_regress_below   (float)  下桶阈值。v 低于该值时报 "regress"。
# ---------------------------------------------------------------------------
metrics:
  speedup_improved_above: 1.05
  speedup_regress_below: 0.95


# ---------------------------------------------------------------------------
# resume 心跳新鲜度窗口（scripts/resume.py）。
#
# /autoresearch 每次 tool call 都会更新
# <task_dir>/.ar_state/state.json 的 `last_touched` 字段。如果某任务的
# last_touched 比这个窗口更新，就认为它仍被另一个 live session 持有；
# resume 会拒绝 attach，避免和正在写入的 session 竞争。若某些慢 EDIT 轮次
# 可能超过这个时间，调大；若希望更快恢复被 kill 的 session，调小。
#
# 字段说明：
#   heartbeat_fresh_seconds  (int seconds)  上述新鲜度窗口。
# ---------------------------------------------------------------------------
resume:
  heartbeat_fresh_seconds: 180
