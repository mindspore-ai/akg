# Framework reference tables. Loaded once per process by settings.py
# (scripts/utils/settings.py exposes one typed accessor per key).
#
# Two categories live in this file:
#   1. Reference tables consumed verbatim (hallucinated_scripts,
#      remote_worker.hosts). Free-form structure.
#   2. Tunable knobs that ship with NO in-code defaults — a missing
#      section/key raises a hard error in settings._get. See the
#      "Tunable knobs" banner below.
#
# Edit values in place; settings.py reads via @lru_cache so a long-lived
# process won't pick up edits without a restart.


# ---------------------------------------------------------------------------
# Hallucinated-script alias map. hooks/guard_bash classifies Bash calls
# against this table BEFORE running them: if Claude tries `python scripts/
# engine/<key>.py ...`, the hook rewrites the rejection message to point
# at <value>.py — a targeted "did you mean ...?" instead of a generic
# "unknown script" error.
#
# Add an entry here whenever a new plausible-looking-but-wrong script
# name shows up in transcripts. The keys are the wrong names Claude
# invents; the values are the real entry-point scripts (must exist on
# disk under scripts/engine/).
# ---------------------------------------------------------------------------
hallucinated_scripts:
  eval.py: baseline.py
  run_eval.py: baseline.py
  verify.py: baseline.py
  check.py: quick_check.py
  run.py: baseline.py
  test.py: quick_check.py
  profile.py: baseline.py


# ---------------------------------------------------------------------------
# Remote worker SSH dispatch — used by
#   `akg_cli worker --remote-host <alias> --start/stop/status ...`
#
# Each alias under `hosts:` describes a machine akg_cli can SSH into and
# launch a worker daemon on. akg_cli reads this table on every --start /
# --status / --stop --remote-host invocation (default: ./config.yaml;
# override with --remote-config <path>).
#
# Field reference:
#   repo_path   (required)  absolute path to the remote akg checkout
#                           (the outer dir holding akg_agents/). akg_cli
#                           uses it to pin remote PYTHONPATH to
#                           `<repo_path>/akg_agents/python` so the daemon
#                           runs the checked-out source, not whatever
#                           `pip install` left in site-packages.
#   env_script  (required)  shell script source'd before launching the
#                           daemon. Must leave `python -c "import
#                           torch_npu, triton"` working in the
#                           non-interactive shell.
#   python      (optional)  python binary to invoke remotely. Default
#                           "python" (whatever env_script puts on PATH).
#   ssh_alias   (optional)  hostname passed to ssh. Default = the key
#                           name itself; override when the host alias in
#                           ~/.ssh/config differs from how you want to
#                           refer to it here.
#
# Tunnel handling is automatic: on --start akg_cli opens
# `ssh -L <port>:127.0.0.1:<port> <alias> -f -N -T` and stashes the
# forked ssh pid at ~/.akg_agents/tunnels/<port>.pid. Subsequent
# --status / --stop / `--worker-url 127.0.0.1:<port>` calls all
# transparently hit the remote daemon over that tunnel.
# ---------------------------------------------------------------------------
remote_worker:
  hosts: {}
  # Example entry — fill in with deployment-specific path / env_script:
  #   my-npu:
  #     repo_path: /abs/path/to/akg
  #     env_script: /abs/path/env.sh
  #     # python: python3
  #     # ssh_alias: my-host


# ===========================================================================
# Tunable knobs.
#
# config.yaml is the SINGLE SOURCE OF TRUTH for everything below.
# settings.py exposes one accessor per key (settings.<name>()) and ships
# NO in-code defaults — a missing section or key raises KeyError on first
# read. Retune by editing the values here; do NOT add fallback defaults
# in settings.py or downstream callers, that defeats the single-source
# guarantee. To remove a knob, delete its accessor in settings.py AND
# the key here AND audit `git grep <accessor>` for callers.
# ===========================================================================


# ---------------------------------------------------------------------------
# Task defaults — applied when a scaffold CLI flag is omitted AND the
# task.yaml doesn't pin the field. Precedence at runtime:
#       task.yaml field   >  this defaults block  >  (no in-code default)
#
# scaffold pins the resolved value into task.yaml at create time, so a
# settled task keeps the value it was scaffolded with even if you retune
# the defaults here.
#
# Field reference:
#   max_rounds            (int)         optimization-round budget for a
#                                       new task: PLAN → EDIT → eval
#                                       cycles. Hit max_rounds and the
#                                       loop auto-transitions to FINISH
#                                       and writes report.md. Override
#                                       per task via scaffold's
#                                       --max-rounds.
#   eval_timeout          (int seconds) wall-clock budget per single
#                                       verify or profile subprocess.
#                                       eval_runner scales by num_cases
#                                       so a 50-shape op gets ~50× the
#                                       budget. Bump on SIGKILL/124;
#                                       shrink to fail-fast hangs.
#   smoke_test_timeout    (int seconds) budget for quick_check's optional
#                                       smoke test (per task, not per
#                                       shape). Only fires when task.yaml
#                                       sets smoke_test_script. Keep
#                                       small — runs every EDIT, on the
#                                       critical path.
#   code_checker_enabled  (bool)        whether the Triton-impl AST
#                                       regression check
#                                       (scripts/utils/validate_triton_impl.py
#                                       via quick_check.py) runs by
#                                       default. Catches kernels that
#                                       fake the @triton.jit contract.
#                                       Flip per-task via task.yaml
#                                       `code_checker: {enabled: false}`
#                                       or scaffold's --no-code-checker.
#   metric.primary        (str)         metric name keep_or_discard
#                                       reads. Currently only
#                                       `latency_us` is interpreted;
#                                       other values land on report.py's
#                                       "unknown metric" branch.
#   metric.lower_is_better (bool)       true = smaller wins (latency);
#                                       false = larger wins (throughput).
#   metric.improvement_threshold (float) KEEP gate.  Unit is PERCENT
#                                       (NOT a fraction), matching
#                                       is_improvement's `relative_pct
#                                       = (best-cand)/|best| * 100`
#                                       comparison.  Examples:
#                                         0.0  → any strict improvement keeps
#                                         2.0  → requires >2 % better
#                                         5.0  → requires >5 % better
#                                       Setting 0.05 here means ">0.05 %"
#                                       — almost any positive improvement.
#   consecutive_fail_threshold (int)    FAIL streak length that flips
#                                       PLAN/EDIT into DIAGNOSE. Was
#                                       hard-coded `3` in
#                                       phase_policy.py.
#   diagnose_max_attempts (int)         DIAGNOSE subagent retries
#                                       allowed per plan_version before
#                                       the manual-fallback artifact
#                                       path opens. Was
#                                       `DIAGNOSE_ATTEMPTS_CAP = 5` in
#                                       state_store.py.
#   backend / framework / dsl (str)     Workspace target triple, pinned
#                                       per repo. utils.akg_eval passes
#                                       these to akg_agents.op.verifier.
#                                       KernelVerifier (snake-form `dsl`
#                                       like `triton_ascend`). NOT on
#                                       TaskConfig — single-target-per-
#                                       repo by design, same as
#                                       skill_dsl. CA's eval_kernel.py
#                                       CLI argparse defaults are the
#                                       upstream equivalent.
# ---------------------------------------------------------------------------
defaults:
  max_rounds: 30
  eval_timeout: 600
  smoke_test_timeout: 10
  code_checker_enabled: true
  metric:
    primary: latency_us
    lower_is_better: true
    improvement_threshold: 0.0
  skill_dsl: triton-ascend
  backend: ascend
  framework: torch
  dsl: triton_ascend
  consecutive_fail_threshold: 3
  diagnose_max_attempts: 5


# ---------------------------------------------------------------------------
# Eval timing measurement (utils/eval_runner.local_eval{,_async}).
# Read where the timing runs: on remote eval the WORKER's config.yaml
# applies, not the orchestrator's. Keep both in sync, or accept that
# warmup/repeats can diverge between local-baseline and remote rounds.
#
# Field reference:
#   warmup   (int) untimed warmup iterations before measurement begins.
#                  Higher = more JIT/cache warming, longer per-round
#                  wall clock. 10 is enough for triton-ascend's compile
#                  cache to settle on most ops.
#   repeats  (int) measured iterations whose mean becomes the reported
#                  latency_us per shape. Higher = lower variance, longer
#                  per-round wall clock. 100 is the variance/cost sweet
#                  spot observed on 910B.
# ---------------------------------------------------------------------------
eval:
  warmup: 5
  repeats: 50


# ---------------------------------------------------------------------------
# Remote worker daemon. Single source for BOTH sides of the wire:
#   - akg_cli (dev side): tunnel port, readiness wait, status probes
#   - akg_agents.worker.server : bind port (so the two cannot drift)
#
# The ready_* / status_* timeouts cover akg_cli's wait on a remote
# daemon over `ssh -L`, which adds variable round-trip latency on top
# of the daemon's own startup time. Bump if you see "worker not ready"
# false-negatives on slow networks; shrink to fail-fast on a wedged
# daemon.
#
# Field reference:
#   port                (int)   TCP port the worker binds (127.0.0.1
#                               only; routing to the dev box goes
#                               through ssh -L). Also the default
#                               --port for akg_cli's --start / --status
#                               / --stop. Change this and the next
#                               `akg_cli worker --start` uses the new
#                               port automatically.
#   ready_timeout       (float) total seconds akg_cli waits after
#                               spawning the remote daemon for it to
#                               answer /status. Polls every
#                               ready_poll_interval. CANN import +
#                               worker boot is ~5s warm cache, ~15s
#                               cold; 20s leaves headroom.
#   ready_poll_interval (float) seconds between readiness polls during
#                               the startup loop. Smaller = faster
#                               pickup, more SSH chatter while waiting.
#   ready_probe_timeout (float) per-poll /status probe timeout DURING
#                               the readiness loop. Kept short so a
#                               wedged tunnel doesn't burn the whole
#                               ready_timeout on one poll. Distinct from
#                               status_timeout below.
#   status_timeout      (float) seconds for a standalone /status
#                               reachability probe (the path
#                               `akg_cli worker --status` takes, and
#                               eval_client uses to fail-fast before
#                               sending a multipart /run). Bump on
#                               high-latency links.
# ---------------------------------------------------------------------------
worker:
  port: 9111
  ready_timeout: 20.0
  ready_poll_interval: 0.5
  ready_probe_timeout: 1.5
  status_timeout: 5.0


# ---------------------------------------------------------------------------
# Batch driver knobs (scripts/batch/*). Two unrelated kinds of timeouts
# bundled together: pre-flight Tier 1/2 verify (used by batch/verify.py
# before the long batch run) and the per-op driver wall clock + cooldown
# (used by batch/run.py while looping through ops).
#
# Field reference:
#   tier1_timeout    (int seconds)  Tier 1 verify budget per op: import
#                                   + tiny-shape smoke. Runs without an
#                                   NPU, mainly catches syntax /
#                                   missing-export errors.
#   tier2_timeout    (int seconds)  Tier 2 verify budget per op: full
#                                   multi-shape correctness with the
#                                   actual kernel. Cold JIT across ~50
#                                   cases on triton-ascend can take
#                                   minutes for kernels with many
#                                   constexpr specializations
#                                   (maxpool3d, attention variants).
#   run_timeout_min  (int minutes)  hard wall-clock cap per op in
#                                   batch/run.py (note: MINUTES, not
#                                   seconds). Each op gets at most this
#                                   many minutes before run.py SIGTERMs
#                                   claude --print and marks the op
#                                   `error`. Override per invocation via
#                                   `batch/run.py --timeout-min N`.
#                                   Calibrate to ~3× the median observed
#                                   (cold JIT + 30 rounds + report).
#   cooldown_sec     (int seconds)  sleep between ops in batch/run.py.
#                                   Lets the worker finish cleanup
#                                   (release device, GC HBM) before the
#                                   next op acquires. Override via
#                                   `--cooldown-sec N`. 0 is allowed but
#                                   invites flaky device-acquire races.
#   transient_retries (int)         max times batch/run.py re-spawns
#                                   `claude --print /autoresearch
#                                   --resume <task_dir> --force` for the
#                                   same op when the session crashed
#                                   mid-flight (claude.exe rc != 0) but
#                                   framework progress is intact
#                                   (progress_initialized=True). Catches
#                                   ECONNRESET / stream idle timeouts /
#                                   transient API errors that exit the
#                                   cli without going through stop_save.
#                                   Real failures (rc=0 + phase != FINISH
#                                   = LLM ended turn early; rc != 0 + no
#                                   progress = baseline never committed)
#                                   skip retry and surface immediately.
# ---------------------------------------------------------------------------
batch:
  tier1_timeout: 30
  tier2_timeout: 600
  run_timeout_min: 180
  cooldown_sec: 5
  transient_retries: 3


# ---------------------------------------------------------------------------
# Speedup classification used by batch reporters (summarize.py /
# monitor.py) and the shared classify_speedup() in settings.py.
# Values are speedup factors v = baseline_us / candidate_us; v=1.0 means
# the kernel matches the ref exactly.
#
# Three buckets: v > improved_above → "improved"; v < regress_below →
# "regress"; everything in between → "on-par". Widen the gap to be more
# forgiving (treat noise as on-par); tighten to flag smaller wins.
#
# Field reference:
#   speedup_improved_above  (float)  upper bucket threshold. v above
#                                    this is reported as "improved".
#   speedup_regress_below   (float)  lower bucket threshold. v below
#                                    this is reported as "regress".
# ---------------------------------------------------------------------------
metrics:
  speedup_improved_above: 1.05
  speedup_regress_below: 0.95


# ---------------------------------------------------------------------------
# Resume heartbeat freshness window (scripts/resume.py).
#
# /autoresearch bumps <task_dir>/.ar_state/state.json's `last_touched`
# field on each tool call. A task whose last_touched is FRESHER than
# this many seconds is treated as still owned by another live session
# — resume refuses to attach (which would race the live writer). Bump
# if a slow Edit round can take longer than this; shrink to recover
# from killed sessions faster.
#
# Field reference:
#   heartbeat_fresh_seconds  (int seconds)  freshness window described
#                                           above.
# ---------------------------------------------------------------------------
resume:
  heartbeat_fresh_seconds: 180
