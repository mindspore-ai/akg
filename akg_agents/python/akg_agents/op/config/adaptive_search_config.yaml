# Adaptive Search Configuration
# 自适应搜索配置文件
#
# 用法:
#   python run_single_adaptive_search.py                                    # 使用此默认配置
#   python run_single_adaptive_search.py <config_file>                      # 使用自定义配置文件
#   python run_single_adaptive_search.py <op_name> <task_file> <device>     # 批量runner模式
#
# 此文件定义自适应搜索算法的默认参数。
# 可以通过函数参数或命令行参数覆盖这些设置。

# ============================================================================
# 任务配置
# ============================================================================
task:
  op_name: "akg_agents_op"                           # 算子名称
  task_desc: "Path/to/your/tasks/task.py"      # 任务描述文件路径（必填，支持 .py 文件）

# ============================================================================
# 环境配置
# ============================================================================
environment:
  dsl: "triton_ascend"        # 实现类型: triton_cuda, triton_ascend, swft
  framework: "torch"          # 框架: torch, mindspore, numpy
  backend: "ascend"           # 后端: cuda, ascend
  arch: "ascend910b4"         # 架构: a100, ascend910b4 等
  device_list: [3]            # 使用的设备 ID 列表

# ============================================================================
# 并发控制
# ============================================================================
concurrency:
  max_concurrent: 2           # 最大并发任务数
  initial_task_count: 2       # 初始生成的任务数
  tasks_per_parent: 1         # 每次选择父代后生成的任务数

# ============================================================================
# 停止条件
# ============================================================================
# 唯一停止条件：达到最大任务数后等待所有任务完成
stopping:
  max_total_tasks: 10         # 最大总任务数

# ============================================================================
# UCB 选择策略参数
# ============================================================================
ucb_selection:
  exploration_coef: 1.414     # UCB 探索系数 (sqrt(2) 是常用值)
  random_factor: 0.1          # 随机扰动因子 (0~1)，增加多样性
  use_softmax: false          # 是否使用 softmax 概率采样选择父代
  softmax_temperature: 1.0    # softmax 温度（温度越高，选择越随机）

# ============================================================================
# 灵感采样参数
# ============================================================================
# 进化任务时，会选择一个父代 + 从 DB 中层次化采样其他灵感
inspiration:
  sample_num: 3               # 从成功任务中采样的灵感数量（不含父代）
  use_tiered_sampling: true   # 是否使用层次化采样（good/medium/poor）

# ============================================================================
# 手写建议采样参数
# ============================================================================
handwrite:
  sample_num: 2               # 手写建议采样数量
  decay_rate: 2.0             # 采样权重衰减率（越大衰减越快）

# ============================================================================
# LLM 配置
# ============================================================================
# 基础配置文件路径（必填，用于加载 LLM 模型、文档目录等配置）
config_path: "python/akg_agents/op/config/vllm_triton_ascend_evolve_config.yaml"

# ============================================================================
# 批量执行配置（用于 run_batch_adaptive_search.py）
# ============================================================================
batch:
  parallel_num: 2                    # 同时运行的算子数量（需 <= device_pool 长度）
  device_pool: [0, 1, 2, 3]          # 设备池，每个算子分配一个设备
  task_dir: "Path/to/your/tasks"     # 任务文件目录（包含多个 .py 任务文件）
  output_dir: "Path/to/your/aikg_adaptive_search/batch_results"  # 输出目录

# ============================================================================
# 特定任务的自定义配置（可选）
# ============================================================================
# 格式：{算子名: 配置参数字典}
# 算子名需以 aikg_ 开头，加上文件名（不含 .py 后缀）
custom_tasks:
  # 示例：为特定算子配置不同参数
  # aikg_relu:
  #   max_concurrent: 2
  #   initial_task_count: 2
  #   max_total_tasks: 30
  # aikg_softmax:
  #   max_concurrent: 4
  #   max_total_tasks: 100
  #   exploration_coef: 2.0
