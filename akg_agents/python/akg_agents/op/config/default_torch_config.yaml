# Log configuration
log_dir: "~/akg_agents_logs"

# Workflow configuration
default_workflow: "coder_only_workflow"
max_step: 10

# Model preset configuration
agent_model_config:
  mathIR: deepseek_v4_pro_thinking_high
  designer: standard
  coder: standard
  code_checker: standard
  conductor: standard
  verifier: standard
  selector: standard
  sketch: standard
  op_task_builder: standard
  api_generator: standard
  feature_extractor: standard
  test_case_generator: standard
  default: standard

# Documentation directory configuration
docs_dir:
  designer: "op/resources/docs/torch_docs"
  coder: "op/resources/docs/torch_docs"

# Performance analysis configuration
profile_settings:
  run_times: 50
  warmup_times: 5

mathir_save: True
mathir_overwrite: True
mathir_use_preset: False
mathir_mlir_export: True
mathir_doc_string: True
mathir_db_math_query: False
multi_kernel_gen: True
multi_kernel_max_retries: 15


# Verification configuration
verify_timeout: 300  # Timeout for verification in seconds (default 5 minutes)

# Multi-case testing configuration
enable_multi_case_verification: false
enable_hint_mode: false
enable_llm_range_inference: false
