# Log configuration
log_dir: "~/akg_agents_logs"

# Workflow configuration
default_workflow: "kernelgen_only_workflow"
max_step: 20

# Evaluation timeout (seconds)
eval_timeout: 600

# Documentation directory configuration
docs_dir:
  kernelgen: ""

# Performance analysis configuration
profile_settings:
  run_times: 50
  warmup_times: 5

# Evaluation timeout (seconds)
eval_timeout: 300

# Verification configuration
verify_timeout: 600

# Multi-case testing configuration
enable_multi_case_verification: false
enable_hint_mode: false
enable_llm_range_inference: false

# Hint mode sampling configuration
multi_case_num: 10
sampling_strategy: "mixed"
sampling_seed: 42

enable_fix_code_gen: false