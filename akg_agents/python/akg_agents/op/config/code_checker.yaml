# CodeChecker static-analysis policy. This file is the sole source of
# truth for every keyword / identifier the checker relies on — the
# Python module `akg_agents.op.utils.code_checker` has zero fallback
# defaults. Missing / malformed keys are a hard error at load time
# (prevents silent divergence between this file and the rules).
#
# Loaded once per process via importlib.resources from inside the
# installed `akg_agents.op.config` package, so this YAML ships as
# package_data (see setup.py `**/*.yaml`).

# ---------------------------------------------------------------------------
# Triton-kernel decorator whitelist. Attribute names under the Triton
# module namespace (see `triton_module_name` below) that mark a function
# as a kernel. Used both to collect kernel definitions and, combined
# with `autotune.decorator_attr`, to generate the autotune regex.
# ---------------------------------------------------------------------------
triton_decorators:
  - jit
  - autotune
  - heuristics

# ---------------------------------------------------------------------------
# Namespaces treated as "torch namespaces" when scanning forward() for
# forbidden `.method(...)` calls. Entries may be either local aliases
# (`F`, `nn.functional`) or full dotted namespaces
# (`torch.nn.functional`, `torch.linalg`). The checker resolves the full
# AST call chain, so `torch.nn.functional.conv2d(...)` is matched by the
# same op policy as `F.conv2d(...)`.
# ---------------------------------------------------------------------------
torch_call_prefixes:
  - torch
  - torch.nn.functional
  - torch.functional
  - nn.functional
  - F
  - torch.linalg
  - linalg
  - torch.fft
  - fft
  - torch.special
  - special
  - torch.sparse
  - sparse

# ---------------------------------------------------------------------------
# Hard blacklist — forbidden in ModelNew.forward() even when a Triton
# kernel is launched. Reserve for ops where leaving them to torch is
# equivalent to not optimizing at all (matmul / conv / einsum / softmax /
# embedding).
# ---------------------------------------------------------------------------
torch_compute_ops_hard:
  # Matrix / linear algebra
  - matmul
  - mm
  - bmm
  - addmm
  - addmv
  - addbmm
  - baddbmm
  - einsum
  - dot
  - mv
  - inner
  - outer
  - linear
  - bilinear
  - multi_dot
  - vecdot
  - cross
  - tensorinv
  - tensorsolve
  - svd
  - svdvals
  - qr
  - lu
  - lu_factor
  - eig
  - eigvals
  - eigh
  - eigvalsh
  - solve
  - solve_triangular
  - lu_solve
  - lstsq
  - inv
  - pinv
  # Convolution
  - conv1d
  - conv2d
  - conv3d
  - conv_transpose1d
  - conv_transpose2d
  - conv_transpose3d
  # Compound activations (reduction + exp)
  - softmax
  - log_softmax
  - logsumexp
  # Other complex ops
  - embedding
  - embedding_bag
  - scaled_dot_product_attention
  - multi_head_attention_forward
  # Spectral transforms
  - fft
  - ifft
  - fft2
  - ifft2
  - fftn
  - ifftn
  - rfft
  - irfft
  - rfft2
  - irfft2
  - rfftn
  - irfftn
  - hfft
  - ihfft
  - hfft2
  - ihfft2
  - hfftn
  - ihfftn

# ---------------------------------------------------------------------------
# Soft blacklist — forbidden in forward() only when no Triton kernel is
# launched. Once a kernel is present these may legitimately appear as
# pre/post processing in fused ops; verify catches perf regressions.
# ---------------------------------------------------------------------------
torch_compute_ops_soft:
  # Simple activations
  - relu
  - gelu
  - silu
  - sigmoid
  - tanh
  - leaky_relu
  - elu
  - hardswish
  - mish
  # Simple elementwise math
  - exp
  - log
  - sqrt
  - rsqrt
  - pow
  - sin
  - cos
  - abs
  - clamp
  - clamp_min
  - clamp_max
  # Simple reductions
  - sum
  - mean
  - prod
  - norm
  - vector_norm
  - matrix_norm
  - amax
  - amin
  - argmax
  - argmin
  # Pool / norm / interpolate / cumsum — HARD until 2026-04, moved here to
  # unblock Ascend seeds that can't express the full op as a single
  # 256-B-aligned Triton schedule (e.g. strided width reduction).
  - layer_norm
  - batch_norm
  - group_norm
  - instance_norm
  - max_pool1d
  - max_pool2d
  - max_pool3d
  - avg_pool1d
  - avg_pool2d
  - avg_pool3d
  - adaptive_avg_pool2d
  - interpolate
  - cumsum
  - cumprod

# ---------------------------------------------------------------------------
# Framework-identifier literals. The checker searches for these exact
# spellings in the AST; change a value only when the project convention
# itself changes (e.g. you rename the kernel class from `ModelNew`).
# ---------------------------------------------------------------------------

# Class that must exist in every generated kernel module.
kernel_class_name: ModelNew

# Method on the kernel class that holds the forward computation. The DSL
# compliance scan (hard/soft torch ops, `@` matmul operator) runs over
# this method's body only.
kernel_forward_method: forward

# Top-level module name treated as the Triton namespace. Decorators like
# `@<triton_module_name>.jit` (combined with `triton_decorators`) mark
# kernel functions.
triton_module_name: triton

# DSL-prefix gate: the compliance + autotune checks only run when
# `self.dsl` startswith any of these prefixes. Keeps the checker silent
# for non-kernel DSLs (torch-only baselines) and non-Python DSLs
# (cpp, cuda_c).
dsl_compliance_prefixes:
  - triton
  - tilelang
  - ascendc

# DSLs whose generated code is Python and can be checked by this
# checker. DSLs not listed here (e.g. cpp, cuda_c) produce
# non-Python code — running ast.parse / py_compile on them would always
# fail and cause an infinite retry loop.
python_dsls:
  - torch
  - triton_cuda
  - triton_ascend
  - ascendc
  - tilelang_cuda
  - tilelang_ascend
  - ascendc_catlass
  - pypto

# ---------------------------------------------------------------------------
# TileLang-kernel identification. Attribute names under the TileLang
# module namespace (see `module_name` below) that mark a function as a
# kernel factory. Inside a tilelang kernel factory, the `@<tl_namespace>.
# <prim_func_attr>` decorator marks the actual kernel entry point.
# ---------------------------------------------------------------------------
tilelang_compliance:
  module_name: tilelang
  decorators:
    - jit
  prim_func_attr: prim_func
  tl_namespace: T

# ---------------------------------------------------------------------------
# PyPTO anti-cheat compliance. PyPTO kernels are marked with
# `@pypto.frontend.jit` / `@pypto.jit` and invoked as ordinary function
# calls `kernel(...)` (often built by a factory then returned), unlike
# Triton's `kernel[grid](...)`. The checker uses these literals to detect
# the two unambiguous cheats: no jit kernel at all, or a jit kernel that is
# never invoked while torch does the real work. Rules are intentionally
# lenient (any call anywhere counts) to avoid false positives.
# ---------------------------------------------------------------------------
pypto_compliance:
  dsl: pypto
  # Root namespace of the kernel decorator (`<module>....<attr>`).
  decorator_module: pypto
  decorator_attr: jit

# ---------------------------------------------------------------------------
# AscendC direct-invoke anti-cheat. CANN-Bench blocks framework compute
# fallbacks and large device-to-host egress at runtime; these regexes catch
# the obvious static forms before eval. Legitimate custom kernels should call
# `torch.ops.npu.<custom_op>(...)` from the wrapper and implement compute in
# `ascendc_op`, not delegate to torch/ATen/torch_npu/aclnn high-level ops.
# ---------------------------------------------------------------------------
ascendc_anti_cheat:
  dsl: ascendc
  # Two-layer anti-cheat. STATIC (forbidden_patterns): source scan for calls that
  # never reach ATen dispatch — raw aclnn* ACL APIs and torch_npu.npu_* builtins —
  # which no torch runtime can observe; BLOCKING. RUNTIME (runtime_guard/): during
  # the candidate's correctness run, the core-compute leaves and bulk D2H egress
  # are DISABLED at the dispatch layer via torch.library override, so delegation
  # by Python, C++ torch::*, or nesting inside the candidate's own custom op all
  # raise — no blind spot (unlike a TorchFunctionMode/TorchDispatchMode watcher,
  # which is suspended while the candidate's own registered op runs).
  text_suffixes:
    - ".asc"
    - ".c"
    - ".cc"
    - ".cmake"
    - ".cpp"
    - ".cxx"
    - ".h"
    - ".hpp"
    - ".py"
    - ".txt"
  text_filenames:
    - CMakeLists.txt
    - CMakePresets.json
  # Patterns are data; their detail/suggestion messages live in code_checker.py
  # (_ASCENDC_PATTERN_MESSAGES). Only calls that bypass ATen dispatch entirely
  # (raw ACL / torch_npu builtins) are scanned + BLOCKED here; everything that
  # reaches dispatch is disabled at runtime by the gate, not by source spelling.
  forbidden_patterns:
    - name: torch_npu_builtin_compute
      pattern: "\\btorch_npu\\s*\\.\\s*npu_[A-Za-z0-9_]+\\s*\\("
    - name: aclnn_builtin_compute
      pattern: "\\baclnn(?:Matmul|Mm|BatchMatMul|GroupedMatmul|WeightQuantBatchMatmul|Convolution|Conv1d|Conv2d|Conv3d|Softmax|LogSoftmax|Topk|TopK|Sort|LayerNorm|RmsNorm|GroupNorm)[A-Za-z0-9_]*\\s*\\("
  # Runtime gate config, read by runtime_guard/ (same file the static scan reads,
  # so the two never drift).
  runtime_guard:
    # block / enforce (fail case) | off. AKG_GUARD_MODE overrides.
    default_mode: block
    # ATen core-compute leaves DISABLED (torch.library override) during the
    # candidate forward. Every dispatch path (matmul / @ / Tensor method / F.*)
    # decomposes onto these leaves, so disabling the leaf blocks every spelling —
    # including C++ torch::* and calls nested in the candidate's own custom op.
    # Generic primitives (gather/where/max/min/abs/pow/mean/sqrt/arange) are
    # absent: legit host glue and golden refs use them.
    compute_leaves:
      - mm
      - bmm
      - addmm
      - baddbmm
      - addbmm
      - matmul
      - mv
      - addmv
      - dot
      - einsum
      - tensordot
      - linear
      - convolution
      - _convolution
      - conv1d
      - conv2d
      - conv3d
      - conv_transpose1d
      - conv_transpose2d
      - conv_transpose3d
      - _conv_depthwise2d
      - slow_conv_transpose2d
      - slow_conv_transpose3d
      - softmax
      - _softmax
      - log_softmax
      - _log_softmax
      - scaled_dot_product_attention
      - _scaled_dot_product_flash_attention
      - _scaled_dot_product_efficient_attention
      - _scaled_dot_product_attention_math
      - layer_norm
      - native_layer_norm
      - group_norm
      - native_group_norm
      - batch_norm
      - native_batch_norm
      - rms_norm
      - _fused_rms_norm
      - silu
      - gelu
      - glu
      - relu
      - topk
      - sort

# ---------------------------------------------------------------------------
# Stray-text detector (Step 4). Flags runs of >= `min_run` consecutive
# characters whose code point falls in any range in `unicode_ranges`,
# observed in code tokens (not inside comments/strings). Defaults match
# CJK Unified Ideographs — add kana/hangul ranges here if LLMs start
# leaking those too.
# ---------------------------------------------------------------------------
stray_text:
  min_run: 3
  unicode_ranges:
    # CJK Unified Ideographs
    - [0x4e00, 0x9fff]

# ---------------------------------------------------------------------------
# @triton.autotune enforcement (Step 6). `decorator_attr` is the
# attribute name off `<triton_module_name>` that triggers the check.
# `required_kwarg` is the keyword the decorator call must contain; when
# absent, autotune re-runs the kernel per config and output buffers
# pollute across configs, breaking verify.
# ---------------------------------------------------------------------------
autotune:
  decorator_attr: autotune
  required_kwarg: restore_value


a5_compliance:
  # Atlas A5 - triton_ascend 可以使能亲和写法实现Cube和Vector的融合
  # al.scope
  # al.fixpipe 走fixpipe搬运数据
  # bl.alloc 分配buffer
  # bl.to_buffer buffer转tensor
  # bl.to_tensor tensor转buffer
  # bl.subview 对buffer做切片
  # bl.sub_vec_id 获取当前AI Core的子vector核编号
  # bl.sync_block_set 发出跨核同步事件
  # bl.sync_block_wait 等待跨核同步事件
  # 亲和写法开关，默认关闭
  enable_triton_ascend_affinity_check: false
  arch_prefix: ascend950
  dsl: triton_ascend
  aliases:
    al: al
    bl: bl
  only_apis:
    - fixpipe
    - copy
    - scope
    - sync_block_set
    - sync_block_wait
    - sub_vec_id
  bl_apis:
    - alloc
    - to_buffer
    - to_tensor
    - subview

catlass_compliance:
  # Whether to enforce torch.ops.catlass.xxx call presence in ModelNew.
  # Hard/soft torch op blacklists (torch_compute_ops_hard /
  # torch_compute_ops_soft) are reused from the global lists above —
  # the same ops that are forbidden for triton (matmul, conv, softmax,
  # einsum, etc.) are equally cheating for catlass.
  enable_catlass_call_check: true
  dsl: ascendc_catlass
  # The dotted namespace prefix that marks a legitimate catlass kernel
  # call. Any call whose AST dotted name starts with this prefix counts
  # as using the DSL.
  call_namespace: torch.ops.catlass
