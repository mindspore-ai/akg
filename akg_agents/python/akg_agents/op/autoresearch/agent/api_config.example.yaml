# Agent API Configuration — TEMPLATE
#
# 用法（任选其一）：
#   1. 设置环境变量 AKG_AGENTS_API_KEY（推荐，绝对不会进 git）
#   2. cp api_config.example.yaml api_config.yaml 后填入 key
