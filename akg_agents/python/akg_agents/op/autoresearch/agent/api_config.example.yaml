# CLI flags（--api-key、--model、--base-url）优先级最高，会覆盖此文件值。

# --- OpenAI-compatible provider ---
# provider: openai
# model: gpt-4o
# base_url: https://example.invalid/v1
# api_key: ${AKG_AGENTS_API_KEY}
# reasoning_effort: high

# --- Anthropic-compatible provider ---
provider: anthropic
model: your-model-or-endpoint
base_url: https://example.invalid/api/compatible
api_key: ${AKG_AGENTS_API_KEY}
