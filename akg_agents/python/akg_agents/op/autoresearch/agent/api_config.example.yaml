# Agent API Configuration — TEMPLATE
#
# 用法（任选其一）：
#   1. 设置环境变量 AKG_AGENTS_API_KEY（推荐，绝对不会进 git）
#   2. cp api_config.example.yaml api_config.yaml 后填入 key
#      （api_config.yaml 已被 .gitignore 排除，不会被提交）
#
# CLI flags（--api-key、--model、--base-url）优先级最高，会覆盖此文件值。

# --- OpenAI-compatible provider ---
# provider: openai
# model: <YOUR_MODEL_NAME>
# base_url: <YOUR_BASE_URL>
# api_key: <YOUR_KEY_HERE>
# reasoning_effort: high

# --- Anthropic-compatible provider ---
provider: anthropic
model: <YOUR_MODEL_OR_ENDPOINT_ID>
base_url: <YOUR_BASE_URL>
api_key: <YOUR_KEY_HERE>
