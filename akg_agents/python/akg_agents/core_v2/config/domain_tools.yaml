tools:
  verify_kernel:
    type: "domain_tool"
    function:
      name: "verify_kernel"
      description: |
        验证生成的 Kernel 代码的正确性。
        对比框架实现（如 PyTorch）和生成实现（如 Triton）的输出结果，验证数值精度是否满足要求。
        
        使用场景：
        - 当用户要求 "验证 kernel"、"检查正确性"、"validate code" 时
        - 在生成代码后，需要确认代码是否正确
        
        参数获取：
        - task_code: 从 call_op_task_builder 的返回结果中获取
        - generated_code: 从代码生成类工具的返回结果中获取
      parameters:
        type: "object"
        properties:
          task_code:
            type: "string"
            description: "PyTorch/MindSpore 框架实现代码。必须包含 class Model(nn.Module)、get_inputs()、get_init_inputs()"
          generated_code:
            type: "string"
            description: "待验证的 Triton/CUDA/AscendC 生成代码。必须包含 class ModelNew 实现"
          op_name:
            type: "string"
            description: "算子名称，如 'relu', 'matmul', 'softmax', 'layernorm' 等"
          task_id:
            type: "string"
            description: "任务 ID，用于日志和目录命名"
            default: "default_task"
          device_id:
            type: "integer"
            description: "设备 ID，默认为 0"
            default: 0
          timeout:
            type: "integer"
            description: "验证超时时间（秒），默认 300 秒"
            default: 300
        required: ["task_code", "generated_code", "op_name"]

  profile_kernel:
    type: "domain_tool"
    function:
      name: "profile_kernel"
      description: |
        对 Kernel 代码进行性能分析（仅性能测试，不做验证）。
        返回框架实现和生成代码的执行时间，以及加速比。
        
        重要：此工具只做性能分析，不验证正确性！
      parameters:
        type: "object"
        properties:
          task_code:
            type: "string"
            description: "PyTorch/MindSpore 框架实现代码。必须包含 class Model(nn.Module)、get_inputs()、get_init_inputs()"
          generated_code:
            type: "string"
            description: "待分析的 Triton/CUDA/AscendC 生成代码。必须包含 class ModelNew 实现"
          op_name:
            type: "string"
            description: "算子名称，如 'relu', 'matmul', 'softmax', 'layernorm' 等"
          task_id:
            type: "string"
            description: "任务 ID，用于日志和目录命名"
            default: "default_task"
          device_id:
            type: "integer"
            description: "设备 ID，默认为 0"
            default: 0
          run_times:
            type: "integer"
            description: "性能测试运行次数，默认 50 次。精确测试可设为 100"
            default: 50
          warmup_times:
            type: "integer"
            description: "预热次数，默认 5 次。精确测试可设为 10"
            default: 5
        required: ["task_code", "generated_code", "op_name"]
