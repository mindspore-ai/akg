# =============================================================================
# 自定义元提示示例文件
# =============================================================================
# 将此文件放在 custom_prompts/ 目录下，MetaPromptManager 会在初始化时自动加载。
#
# 文件格式要求:
#   - 顶层必须包含 "meta_prompts" 键，值为列表
#   - 每个元素为一个 MetaPrompt 定义（字段含义参见 MetaPrompt dataclass）
#   - 必填字段: id, category
#   - 仅支持 .yaml / .yml 格式
#
# 可用的 category 值:
#   data_partition, parallelism, pipeline, fusion, memory, scheduling
#
# 使用方式:
#   方式1（自动加载）: 将文件放入 core/meta_prompt/custom_prompts/ 目录，程序启动时自动加载
#   方式2（手动加载）: manager.load_from_file("path/to/your_file.yaml")
#   方式3（指定目录）: 在 yaml 配置文件中指定 custom_meta_prompts_dir: "your/dir"（绝对路径），MetaPromptManager 会优先从该目录加载
#
# =============================================================================

